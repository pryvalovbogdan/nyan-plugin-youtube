<!doctype html>
<html>
<head>
    <title>Kitty picker</title>
    <link rel="stylesheet" href="./popup.css">
</head>
<body>
    <div class="theme-toggle-container">
        <h1 class="kitty-title" id="popupTitle">Kitty selector</h1>

        <label class="switch">
            <input type="checkbox" id="themeCheckbox">
            <span class="slider"></span>
        </label>
    </div>

    <div class="lang-select-container">
        <button id="langDropdownTrigger" class="lang-dropdown-trigger">English</button>
        <div id="langDropdownMenu" class="lang-dropdown-menu"></div>
    </div>
    <div class="cat-grid-container" id="catGrid">
        <label class="cat-grid-item upload-tile-card" for="gifUploader" title="Upload your own custom GIF!">
            <div class="upload-plus-icon">+</div>
            <div class="upload-text">Upload GIF</div>
            <input type="file" id="gifUploader" accept="image/gif" style="display: none;" />
        </label>
    </div>
    <div class="custom-cat-controls" id="customCatControls">
        <div class="custom-cat-control-row">
            <span class="control-label">Height</span>
            <div class="control-stepper">
                <button class="control-btn" id="heightDown">▼</button>
                <span class="control-value" id="heightValue">28</span>
                <span class="control-unit">px</span>
                <button class="control-btn" id="heightUp">▲</button>
            </div>
        </div>
        <div class="custom-cat-control-row">
            <span class="control-label">Top</span>
            <div class="control-stepper">
                <button class="control-btn" id="topDown">▼</button>
                <span class="control-value" id="topValue">-13</span>
                <span class="control-unit">px</span>
                <button class="control-btn" id="topUp">▲</button>
            </div>
        </div>
    </div>
    <div class="support-button-container">
        <a href="https://ko-fi.com/nyancustombar" target="_blank" class="support-button" id="supportBtn" title="Support the project">
            Support
        </a>
    </div>
    <script src="./popup.js"></script>
</body>
</html>
